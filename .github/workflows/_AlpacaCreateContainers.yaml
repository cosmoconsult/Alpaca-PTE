name: '_COSMO Alpaca - Create Containers'

on:
  workflow_call:
    inputs:
      backendUrl:
        description: COSMO Alpaca backend Url
        required: true
        type: string
      buildOrderJson:
        description:  An array of objects that determine that build order, including build dimensions
        required: true
        type: string
    outputs:
      containersJson:
        description: An array of Alpaca container informations in compressed JSON format
        value: ${{ jobs.CreateAlpacaContainers.outputs.containersJson }}

defaults:
  run:
    shell: pwsh

env:
  ALPACA_BACKEND_URL: ${{ inputs.backendUrl }}

jobs:
  CreateAlpacaContainers:
    name: Create COSMO Alpaca Containers
    runs-on: [ ubuntu-latest ]
    outputs:
      containersJson: ${{ steps.CreateContainers.outputs.containersJson }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          sparse-checkout: |
            *.json
          sparse-checkout-cone-mode: 'false'
      - name: Read settings
        uses: microsoft/AL-Go-Actions/ReadSettings@v8.3
        with:
          shell: pwsh
      - id: CreateContainers
        name: Create Containers
        uses: cosmoconsult/Alpaca-Actions/Actions/CreateContainers@v2.6.0
        with:
          shell: pwsh
          token: ${{ secrets.GITHUB_TOKEN }}
          buildOrderJson: ${{ inputs.buildOrderJson }}
